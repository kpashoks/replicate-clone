name: Build and push downloader image

# Builds runpod-downloader/Dockerfile and pushes to ghcr.io. Triggered on any
# push to main that touches runpod-downloader/ or this workflow itself.

on:
  push:
    branches: [main]
    paths:
      - 'runpod-downloader/**'
      - '.github/workflows/build-downloader.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        # github.repository is `<owner>/<repo>`; we want
        # `ghcr.io/<owner>/<repo>-downloader:latest`.
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-downloader" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-downloader
          file: ./runpod-downloader/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          provenance: false

      - name: Print image URLs
        run: |
          echo "Pushed:"
          echo "  ${{ steps.img.outputs.name }}:latest"
          echo "  ${{ steps.img.outputs.name }}:${{ github.sha }}"
