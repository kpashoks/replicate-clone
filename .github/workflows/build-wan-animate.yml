name: Build wan-animate image

# MANUAL TRIGGER ONLY. The wan-animate image is large (~12 GB) and the
# Dockerfile clones the upstream Wan-Video repo which can break under us
# at any time. We don't want every commit to runpod-wan-animate/ to spin
# up a GHA runner and burn ~10 min on a build that might fail upstream.
#
# To build: Actions tab -> "Build wan-animate image" -> Run workflow
# Or:       gh workflow run "Build wan-animate image" --ref main
#
# Once we're confident the build is stable, uncomment the push: block to
# enable auto-build on changes to runpod-wan-animate/.

on:
  workflow_dispatch:
    inputs:
      wan_revision:
        description: 'Wan-Video/Wan2.2 git revision to bake into the image (branch, tag, or commit SHA)'
        required: false
        default: 'main'
  # Uncomment to enable auto-build on push:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'runpod-wan-animate/**'
  #     - '.github/workflows/build-wan-animate.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        # GHA runners ship with ~14 GB free. The wan-animate base image
        # (nvidia/cuda + python + torch + Wan-Video repo) is ~10 GB and
        # the pip install layer adds more. Prune preinstalled tooling we
        # don't need to make headroom for both the build context and
        # docker save.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker system prune -af || true
          df -h

      - name: Lowercase image name
        # ghcr.io image paths must be lowercase. github.repository is
        # already lowercase for kpashoks/replicate-clone, but this is
        # defensive for forks.
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-wan-animate" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-wan-animate
          file: ./runpod-wan-animate/Dockerfile
          push: true
          build-args: |
            WAN_REVISION=${{ inputs.wan_revision || 'main' }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          # Don't use GHA cache: 10 GB limit, our image is ~12 GB.
          provenance: false

      - name: Print image URLs
        run: |
          echo "Pushed:"
          echo "  ${{ steps.img.outputs.name }}:latest"
          echo "  ${{ steps.img.outputs.name }}:${{ github.sha }}"
          echo ""
          echo "Next steps:"
          echo "  1. RunPod console -> Pods -> Deploy with custom container"
          echo "     image: ${{ steps.img.outputs.name }}:latest"
          echo "  2. GPU: 24 GB minimum (RTX 4090 / A6000 / L40 / larger)"
          echo "  3. Attach the existing replicate-local-models Network Volume at /runpod-volume"
          echo "  4. Expose HTTP port 8000"
          echo "  5. Once running, copy the public URL into the main app's .env as WAN_ANIMATE_ENDPOINT"
