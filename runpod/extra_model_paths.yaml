# ComfyUI uses this file to discover model directories outside its install
# tree. RunPod mounts Network Volumes at /runpod-volume on Serverless
# endpoints (hardcoded, not configurable). On Pods the same volume is
# typically mounted at /workspace, but this YAML is only loaded inside the
# Serverless container so /runpod-volume is what we use.

runpod_volume:
  base_path: /runpod-volume/ComfyUI/
  is_default: true
  checkpoints: models/checkpoints/
  diffusion_models: models/diffusion_models/
  unet: models/diffusion_models/
  text_encoders: models/text_encoders/
  clip: models/text_encoders/
  vae: models/vae/
  loras: models/loras/
  upscale_models: models/upscale_models/
  clip_vision: models/clip_vision/
  controlnet: models/controlnet/
